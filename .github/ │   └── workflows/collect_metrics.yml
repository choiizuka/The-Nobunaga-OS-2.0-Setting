name: CHOIIZUKA-Metrics-Collector

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 00:00 = JST 09:00 に毎日実行
  workflow_dispatch:       # 手動実行用

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dateutil

      - name: Run collector
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
        run: python scripts/collect_metrics.py

      - name: Commit results
        run: |
          git config --local user.email "bot@choiizuka.com"
          git config --local user.name "Nobunaga-Bot"
          git add data/daily_metrics.csv ADMIN_STATS.md || true
          git commit -m "Auto: Update metrics $(date -u +%Y-%m-%d)" || echo "No changes"
          git push || echo "Push failed"
